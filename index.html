    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f8f9ff 0%, #f0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .quiz-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2), 0 2px 10px rgba(0,0,0,0.02);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .hero {
            background: linear-gradient(135deg, #FFFFFF 0%, #F3E8FF 100%);
            padding: 1.8rem 2rem;
            border-bottom: 1px solid rgba(128, 90, 213, 0.2);
        }

        .hero h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(120deg, #5E3A9C, #9B6BFF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .hero h1 i {
            background: none;
            color: #8B5CF6;
            font-size: 2rem;
        }

        .sub {
            color: #4a3b6e;
            font-weight: 500;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .score-panel {
            background: white;
            margin: 0 1.8rem 1rem 1.8rem;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 6px 14px rgba(106, 46, 176, 0.08);
            border: 1px solid rgba(156, 107, 255, 0.3);
        }

        .score-box {
            background: #f1ebff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 700;
            color: #5a2d9c;
        }

        .score-box span {
            font-size: 1.3rem;
            font-weight: 800;
            color: #6c2bd9;
        }

        .progress-indicator {
            font-weight: 500;
            background: #ede8ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            color: #4f359b;
        }

        .quiz-card {
            padding: 1.8rem 2rem 2rem 2rem;
        }

        .question-text {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1E1A3E;
            margin-bottom: 2rem;
            line-height: 1.3;
            background: #F9F6FF;
            padding: 1rem 1.5rem;
            border-radius: 2rem;
            border-left: 8px solid #9B6BFF;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option-btn {
            background: white;
            border: 1.5px solid #E2D6FF;
            border-radius: 1.2rem;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #2d2a4a;
        }

        .option-btn:hover:not(:disabled) {
            background: #F5EFFF;
            border-color: #9B6BFF;
            transform: translateX(6px);
        }

        .prefix {
            font-weight: 800;
            background: #ede4ff;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #6c2bd9;
        }

        .feedback-area {
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin: 1rem 0 1.5rem;
            border-left: 6px solid #9B6BFF;
            transition: all 0.2s;
        }

        .feedback-correct {
            background: #E6F9ED;
            border-left-color: #2b9348;
        }

        .feedback-wrong {
            background: #FFEFEF;
            border-left-color: #e63946;
        }

        .feedback-neutral {
            background: #F4F0FE;
            border-left-color: #bdc3e0;
        }

        .feedback-text {
            font-weight: 500;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            gap: 1rem;
        }

        .nav-btn {
            background: white;
            border: none;
            padding: 0.8rem 1.6rem;
            border-radius: 2rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
        }

        .nav-btn-primary {
            background: linear-gradient(95deg, #7C3AED, #A78BFA);
            color: white;
            border: none;
            box-shadow: 0 6px 14px rgba(124, 58, 237, 0.3);
        }

        .nav-btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-area {
            background: white;
            border-radius: 2rem;
            margin: 1rem 1.8rem 1.8rem 1.8rem;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-top: 2px solid #cbbaff;
        }

        .weakness-tag {
            background: #ede8ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin: 0.2rem;
        }

        .chart-container {
            max-width: 220px;
            margin: 0 auto;
        }

        @media (max-width: 680px) {
            .quiz-card {
                padding: 1rem;
            }
            .question-text {
                font-size: 1.3rem;
            }
            .hero h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container" id="quizApp">
    <div class="hero">
        <h1><i class="fas fa-gem"></i> SALVO GROUP <br style="display: none;"> GRAMMAR BASIC PART 1</h1>
        <div class="sub">✨ Master your English grammar — instant feedback & smart scoring</div>
    </div>

    <div class="score-panel">
        <div class="score-box"><i class="fas fa-star-of-life"></i> SCORE : <span id="scoreValue">0</span> / <span id="totalQuestions">0</span></div>
        <div class="progress-indicator"><i class="fas fa-question-circle"></i> Soal <span id="currentIdxDisplay">1</span> dari <span id="totalDisplay">0</span></div>
    </div>

    <div class="quiz-card" id="quizCard">
        <div class="question-text" id="questionText">Loading...</div>
        <div class="options-grid" id="optionsContainer"></div>
        <div id="feedbackArea" class="feedback-area feedback-neutral">
            <div class="feedback-text"><i class="fas fa-lightbulb"></i> Pilih salah satu jawaban untuk melihat pembahasan & kunci.</div>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" disabled><i class="fas fa-arrow-left"></i> Sebelumnya</button>
            <button class="nav-btn nav-btn-primary" id="nextBtn" disabled><i class="fas fa-arrow-right"></i> Selanjutnya</button>
        </div>

        <!-- hasil akhir dengan chart dan kelemahan -->
    </div>
</div>

<script>
    // ---------- SOAL BARU DENGAN PENJELASAN BILINGUAL PANJANG & DETAIL ----------
    const questionsData = [
        { 
            q: "Sukma and Riri ______ studying for the exam when the fire alarm rang.", 
            o: ["Are", "Is", "Were", "Was"], 
            correct: 2, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> This sentence describes an action that was in progress in the past when another action interrupted it. This is Past Continuous Tense. The subject 'Sukma and Riri' is plural, so we use 'were'. 'Were studying' indicates they were in the middle of studying when the alarm rang.<br><br>📌 <strong>Indonesia:</strong> Kalimat ini menggambarkan aksi yang sedang berlangsung di masa lalu ketika aksi lain menyela. Ini adalah Past Continuous Tense. Subjek 'Sukma and Riri' adalah jamak, sehingga kita menggunakan 'were'. 'Were studying' menunjukkan mereka sedang dalam proses belajar ketika alarm berbunyi.<br><br>📌 <strong>Rumus / Formula:</strong> Subject (plural) + were + verb-ing + when + simple past<br><br>📌 <strong>Arti / Meaning:</strong> 'Sukma dan Riri sedang belajar ketika alarm kebakaran berbunyi.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Were</strong>"
        },
        { 
            q: "The plane __________ at 8AM tomorrow.", 
            o: ["Leave", "Leaves", "Will leave", "Leaving"], 
            correct: 2, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> 'Tomorrow' indicates future time. Simple Future Tense is formed with 'will + verb-1'. 'The plane will leave at 8AM tomorrow' means there is a plan or schedule for the plane to depart. While scheduled events can use Simple Present, 'will leave' is also correct for future plans.<br><br>📌 <strong>Indonesia:</strong> 'Tomorrow' menunjukkan waktu masa depan. Simple Future Tense dibentuk dengan 'will + verb-1'. 'The plane will leave at 8AM tomorrow' berarti ada rencana atau jadwal pesawat untuk berangkat. Meskipun acara terjadwal bisa menggunakan Simple Present, 'will leave' juga benar untuk rencana masa depan.<br><br>📌 <strong>Rumus / Formula:</strong> Subject + will + verb-1 + time signal (future)<br><br>📌 <strong>Arti / Meaning:</strong> 'Pesawat akan berangkat jam 8 pagi besok.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Will leave</strong>"
        },
        { 
            q: "I _______ have a cat 3 years ago", 
            o: ["Used to", "Am used to", "Was", "Get used to"], 
            correct: 0, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> '3 years ago' indicates a past habit or state that is no longer true. 'Used to' is used to talk about past habits or states that have changed. 'I used to have a cat' means I had a cat in the past but no longer have it now.<br><br>📌 <strong>Indonesia:</strong> '3 years ago' menunjukkan kebiasaan atau keadaan masa lalu yang tidak lagi benar. 'Used to' digunakan untuk berbicara tentang kebiasaan atau keadaan masa lalu yang telah berubah. 'I used to have a cat' berarti saya dulu punya kucing tetapi sekarang tidak lagi.<br><br>📌 <strong>Rumus / Formula:</strong> Subject + used to + verb-1 + time signal (past)<br><br>📌 <strong>Arti / Meaning:</strong> 'Saya dulu punya kucing 3 tahun yang lalu.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Used to</strong>"
        },
        { 
            q: "Agus __________ his homework before going to workout", 
            o: ["Finish", "Finished", "Finishes", "Finishing"], 
            correct: 2, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> This sentence describes a habitual action or a general truth. Subject 'Agus' is third person singular, so the verb must end with '-es'. 'Finishes' is the correct form. 'Agus finishes his homework before going to workout' means Agus always does his homework first before exercising.<br><br>📌 <strong>Indonesia:</strong> Kalimat ini menggambarkan kebiasaan atau kebenaran umum. Subjek 'Agus' adalah orang ketiga tunggal, sehingga kata kerja harus berakhiran '-es'. 'Finishes' adalah bentuk yang benar. 'Agus finishes his homework before going to workout' berarti Agus selalu mengerjakan PR-nya terlebih dahulu sebelum berolahraga.<br><br>📌 <strong>Rumus / Formula:</strong> Subject (singular) + verb-1+s/es + complement<br><br>📌 <strong>Arti / Meaning:</strong> 'Agus menyelesaikan PR-nya sebelum pergi berolahraga.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Finishes</strong>"
        },
        { 
            q: "The pencil is ______ the Freezer", 
            o: ["On", "In", "At", "Between"], 
            correct: 0, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> Prepositions of place: 'on' is used for surfaces, 'in' for enclosed spaces, 'at' for specific points, 'between' for two objects. A freezer is a closed container, so 'in' is the correct preposition. 'The pencil is in the freezer' means the pencil is inside the freezer.<br><br>📌 <strong>Indonesia:</strong> Preposisi tempat: 'on' digunakan untuk permukaan, 'in' untuk ruang tertutup, 'at' untuk titik spesifik, 'between' untuk dua objek. Freezer adalah wadah tertutup, jadi 'in' adalah preposisi yang benar. 'The pencil is in the freezer' berarti pensil itu ada di dalam freezer.<br><br>📌 <strong>Rumus / Formula:</strong> Subject + to be + in + enclosed space<br><br>📌 <strong>Arti / Meaning:</strong> 'Pensil itu ada di dalam freezer.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: In</strong>"
        },
        { 
            q: "Dodi and Bima _________ playing soccer every weekend", 
            o: ["Enjoys", "Enjoy", "Enjoyes", "Enjoying"], 
            correct: 1, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> 'Every weekend' indicates a habitual action (Simple Present). The subject 'Dodi and Bima' is plural, so the verb 'enjoy' does not add '-s'. The structure is 'enjoy + verb-ing'. 'Dodi and Bima enjoy playing soccer every weekend' means they like playing soccer regularly.<br><br>📌 <strong>Indonesia:</strong> 'Every weekend' menunjukkan kebiasaan (Simple Present). Subjek 'Dodi and Bima' adalah jamak, sehingga kata kerja 'enjoy' tidak mendapat '-s'. Strukturnya adalah 'enjoy + verb-ing'. 'Dodi and Bima enjoy playing soccer every weekend' berarti mereka suka bermain sepak bola secara teratur.<br><br>📌 <strong>Rumus / Formula:</strong> Subject (plural) + enjoy + verb-ing + complement<br><br>📌 <strong>Arti / Meaning:</strong> 'Dodi dan Bima menikmati bermain sepak bola setiap akhir pekan.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Enjoy</strong>"
        },
        { 
            q: "I _________ my teeth 3 times yesterday", 
            o: ["Brush", "Brushes", "Brushed", "Brushing"], 
            correct: 2, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> 'Yesterday' is a past time signal, so we use Simple Past Tense. Regular verb 'brush' becomes 'brushed' in past tense. 'I brushed my teeth 3 times yesterday' means the action happened and was completed in the past.<br><br>📌 <strong>Indonesia:</strong> 'Yesterday' adalah penanda waktu lampau, sehingga kita menggunakan Simple Past Tense. Kata kerja beraturan 'brush' menjadi 'brushed' dalam bentuk lampau. 'I brushed my teeth 3 times yesterday' berarti aksi terjadi dan selesai di masa lalu.<br><br>📌 <strong>Rumus / Formula:</strong> Subject + verb-2 + complement + time signal (past)<br><br>📌 <strong>Arti / Meaning:</strong> 'Saya menyikat gigi 3 kali kemarin.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Brushed</strong>"
        },
        { 
            q: "The children didn't _____ to school yesterday", 
            o: ["Go", "Goes", "Gone", "Went"], 
            correct: 0, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> After the auxiliary 'didn't' (did not), the verb must be in base form (verb-1). 'Go' is the base form. 'The children didn't go to school yesterday' means they did not attend school yesterday.<br><br>📌 <strong>Indonesia:</strong> Setelah auxiliary 'didn't' (did not), kata kerja harus dalam bentuk dasar (verb-1). 'Go' adalah bentuk dasar. 'The children didn't go to school yesterday' berarti mereka tidak pergi ke sekolah kemarin.<br><br>📌 <strong>Rumus / Formula:</strong> Subject + didn't + verb-1 + complement + time signal<br><br>📌 <strong>Arti / Meaning:</strong> 'Anak-anak tidak pergi ke sekolah kemarin.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Go</strong>"
        },
        { 
            q: "I ______ so happy last night", 
            o: ["Am", "Is", "Were", "Was"], 
            correct: 3, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> 'Last night' indicates past time. Subject 'I' uses 'was' in past tense. 'I was so happy last night' means the feeling of happiness occurred in the past.<br><br>📌 <strong>Indonesia:</strong> 'Last night' menunjukkan waktu lampau. Subjek 'I' menggunakan 'was' dalam bentuk lampau. 'I was so happy last night' berarti perasaan bahagia itu terjadi di masa lalu.<br><br>📌 <strong>Rumus / Formula:</strong> Subject (I) + was + adjective + time signal (past)<br><br>📌 <strong>Arti / Meaning:</strong> 'Saya sangat bahagia tadi malam.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Was</strong>"
        },
        { 
            q: "I ______ my homework every evening", 
            o: ["Does", "Do", "Did", "Done"], 
            correct: 1, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> 'Every evening' indicates a habitual action (Simple Present). Subject 'I' uses the base form of the verb 'do'. 'I do my homework every evening' means it is a regular activity.<br><br>📌 <strong>Indonesia:</strong> 'Every evening' menunjukkan kebiasaan (Simple Present). Subjek 'I' menggunakan bentuk dasar kata kerja 'do'. 'I do my homework every evening' berarti itu adalah kegiatan rutin.<br><br>📌 <strong>Rumus / Formula:</strong> Subject (I/You/We/They) + verb-1 + complement + time signal<br><br>📌 <strong>Arti / Meaning:</strong> 'Saya mengerjakan PR setiap malam.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Do</strong>"
        },
        { 
            q: "Whom______________________________visited ?", 
            o: ["Has your neighbor", "Has your new neighbor", "Did your new neighbor", "Done"], 
            correct: 1, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> 'Whom' is used as an object question. This is a Present Perfect question: 'Has + subject + verb-3?'. The correct structure is 'Whom has your new neighbor visited?' meaning 'Siapa yang telah dikunjungi oleh tetangga barumu?'.<br><br>📌 <strong>Indonesia:</strong> 'Whom' digunakan sebagai pertanyaan objek. Ini adalah pertanyaan Present Perfect: 'Has + subjek + verb-3?'. Struktur yang benar adalah 'Whom has your new neighbor visited?' yang berarti 'Siapa yang telah dikunjungi oleh tetangga barumu?'.<br><br>📌 <strong>Rumus / Formula:</strong> Whom + has + subject + verb-3?<br><br>📌 <strong>Arti / Meaning:</strong> 'Siapa yang telah dikunjungi oleh tetangga barumu?'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Has your new neighbor</strong>"
        },
        { 
            q: "Whom do you ______________ every morning?", 
            o: ["Miss", "Missed", "Missing", "Misses"], 
            correct: 0, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> After 'do you', the verb must be in base form (verb-1). 'Miss' is the base form. 'Whom do you miss every morning?' means 'Siapa yang kamu rindukan setiap pagi?'.<br><br>📌 <strong>Indonesia:</strong> Setelah 'do you', kata kerja harus dalam bentuk dasar (verb-1). 'Miss' adalah bentuk dasar. 'Whom do you miss every morning?' berarti 'Siapa yang kamu rindukan setiap pagi?'.<br><br>📌 <strong>Rumus / Formula:</strong> Whom + do + you + verb-1 + time signal?<br><br>📌 <strong>Arti / Meaning:</strong> 'Siapa yang kamu rindukan setiap pagi?'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Miss</strong>"
        },
        { 
            q: "A : There are four radios in the attic B : Yes, but ________ of them work. They are _________ broken", 
            o: ["Neither/none", "All/both", "Both/Neither", "None/All"], 
            correct: 3, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> 'None of them work' means zero of the radios function. 'They are all broken' means every radio is damaged. This combination correctly expresses that all four radios are not working.<br><br>📌 <strong>Indonesia:</strong> 'None of them work' berarti tidak ada satu pun radio yang berfungsi. 'They are all broken' berarti setiap radio rusak. Kombinasi ini dengan tepat menyatakan bahwa keempat radio tidak berfungsi.<br><br>📌 <strong>Rumus / Formula:</strong> None of + plural noun + plural verb / All + are + adjective<br><br>📌 <strong>Arti / Meaning:</strong> 'Tidak ada yang berfungsi. Semuanya rusak.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: None/All</strong>"
        },
        { 
            q: "A : They Aren't at home. They _____________out B : ok, can you give them this envelope", 
            o: ["Are going", "Go", "Can go", "Have gone"], 
            correct: 3, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> The result of an action that affects the present (they are not at home now) is best expressed with Present Perfect Tense. 'Have gone' means they left and haven't returned. 'They have gone out' means they are currently out.<br><br>📌 <strong>Indonesia:</strong> Hasil dari suatu aksi yang mempengaruhi saat ini (mereka tidak di rumah sekarang) paling tepat diungkapkan dengan Present Perfect Tense. 'Have gone' berarti mereka pergi dan belum kembali. 'They have gone out' berarti mereka sedang keluar.<br><br>📌 <strong>Rumus / Formula:</strong> Subject (plural) + have + verb-3 + complement<br><br>📌 <strong>Arti / Meaning:</strong> 'Mereka sedang keluar.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Have gone</strong>"
        },
        { 
            q: "William _________ a lot about 19th century poets recently, and he __________another book about them a few hours ago", 
            o: ["Is reading / has bought", "Read / can buy", "Has read / bought", "Had read / bought"], 
            correct: 2, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> 'Recently' indicates Present Perfect Tense. 'Has read' shows a completed action with present relevance. 'A few hours ago' is a specific past time, so Simple Past 'bought' is used. 'William has read a lot... and he bought another book...'<br><br>📌 <strong>Indonesia:</strong> 'Recently' menunjukkan Present Perfect Tense. 'Has read' menunjukkan aksi yang telah selesai dengan relevansi saat ini. 'A few hours ago' adalah waktu lampau spesifik, sehingga Simple Past 'bought' digunakan. 'William has read a lot... and he bought another book...'<br><br>📌 <strong>Rumus / Formula:</strong> Present Perfect (has + verb-3) + and + Simple Past (verb-2)<br><br>📌 <strong>Arti / Meaning:</strong> 'William baru-baru ini banyak membaca tentang penyair abad ke-19, dan dia membeli buku lain tentang mereka beberapa jam yang lalu.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Has read / bought</strong>"
        },
        { 
            q: "___________ you _________ your homework yet ?", 
            o: ["Do/do", "Did/do", "Can/do", "Have/done"], 
            correct: 3, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> 'Yet' is used in Present Perfect Tense questions. The structure is 'Have/Has + subject + verb-3?'. 'Have you done your homework yet?' means 'Apakah kamu sudah mengerjakan PR-mu?'.<br><br>📌 <strong>Indonesia:</strong> 'Yet' digunakan dalam pertanyaan Present Perfect Tense. Strukturnya adalah 'Have/Has + subjek + verb-3?'. 'Have you done your homework yet?' berarti 'Apakah kamu sudah mengerjakan PR-mu?'.<br><br>📌 <strong>Rumus / Formula:</strong> Have + you + verb-3 + yet?<br><br>📌 <strong>Arti / Meaning:</strong> 'Apakah kamu sudah mengerjakan PR-mu?'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Have/done</strong>"
        },
        { 
            q: "The boy _____________ all the questions in the test correctly yesterday", 
            o: ["Has answer", "Answered", "Is answering", "Can answer"], 
            correct: 1, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> 'Yesterday' is a past time signal, so we use Simple Past Tense. 'Answered' is the past tense form of 'answer'. 'The boy answered all the questions correctly yesterday' means he completed the action in the past.<br><br>📌 <strong>Indonesia:</strong> 'Yesterday' adalah penanda waktu lampau, sehingga kita menggunakan Simple Past Tense. 'Answered' adalah bentuk lampau dari 'answer'. 'The boy answered all the questions correctly yesterday' berarti dia menyelesaikan aksi di masa lalu.<br><br>📌 <strong>Rumus / Formula:</strong> Subject + verb-2 + complement + time signal (past)<br><br>📌 <strong>Arti / Meaning:</strong> 'Anak laki-laki itu menjawab semua pertanyaan dalam ujian dengan benar kemarin.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Answered</strong>"
        },
        { 
            q: "Rafael ____________ a student at university for eight years. He __________ school yet", 
            o: ["Has been / hasn't finished", "Is / didn't finish", "Was / doesn't finish", "Can be / isn't finishing"], 
            correct: 0, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> 'For eight years' indicates a duration from past to present, so Present Perfect Continuous or Present Perfect is used. 'Has been' shows he started in the past and continues. 'Yet' is used with Present Perfect negative: 'hasn't finished' means not completed up to now.<br><br>📌 <strong>Indonesia:</strong> 'For eight years' menunjukkan durasi dari masa lalu hingga sekarang, sehingga Present Perfect atau Present Perfect Continuous digunakan. 'Has been' menunjukkan dia mulai di masa lalu dan berlanjut. 'Yet' digunakan dengan Present Perfect negatif: 'hasn't finished' berarti belum selesai sampai sekarang.<br><br>📌 <strong>Rumus / Formula:</strong> Subject + has been + complement + for + duration / Subject + hasn't + verb-3 + yet<br><br>📌 <strong>Arti / Meaning:</strong> 'Rafael telah menjadi mahasiswa di universitas selama delapan tahun. Dia belum lulus sekolah.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Has been / hasn't finished</strong>"
        },
        { 
            q: "In the morning, she ____________ a cake for her friend's birthday and _________ it with chocolate drops", 
            o: ["Is making / is decorating", "Made / decorated", "Has made / has decorated", "Can make / can decorate"], 
            correct: 1, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> This describes completed actions in the past. Simple Past Tense is appropriate for a sequence of completed events. 'Made' and 'decorated' are past tense forms. The sentence tells a story about what she did in the morning.<br><br>📌 <strong>Indonesia:</strong> Ini menggambarkan aksi yang telah selesai di masa lalu. Simple Past Tense tepat untuk rangkaian kejadian yang telah selesai. 'Made' dan 'decorated' adalah bentuk lampau. Kalimat ini menceritakan tentang apa yang dia lakukan di pagi hari.<br><br>📌 <strong>Rumus / Formula:</strong> Subject + verb-2 + complement + and + subject + verb-2 + complement<br><br>📌 <strong>Arti / Meaning:</strong> 'Di pagi hari, dia membuat kue untuk ulang tahun temannya dan menghiasnya dengan tetesan cokelat.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Made / decorated</strong>"
        },
        { 
            q: "Nancy ________ the floor, so be careful it ___________ slippery at the moment", 
            o: ["Is polishing / was", "Polished / has been", "Has polished / is", "Polishes / were"], 
            correct: 2, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP / DETAILED EXPLANATION:</strong><br><br>📌 <strong>English:</strong> The first part describes a completed action with present result (the floor is slippery now). Present Perfect 'has polished' is used. 'At the moment' indicates present state, so 'is' is used. 'Nancy has polished the floor, so be careful it is slippery at the moment.'<br><br>📌 <strong>Indonesia:</strong> Bagian pertama menggambarkan aksi yang telah selesai dengan hasil saat ini (lantai licin sekarang). Present Perfect 'has polished' digunakan. 'At the moment' menunjukkan keadaan saat ini, sehingga 'is' digunakan. 'Nancy has polished the floor, so be careful it is slippery at the moment.'<br><br>📌 <strong>Rumus / Formula:</strong> Subject + has + verb-3 + object, so + subject + to be (present) + adjective<br><br>📌 <strong>Arti / Meaning:</strong> 'Nancy telah mengepel lantai, jadi hati-hati karena saat ini licin.'<br><br>✅ <strong>Jawaban Benar / Correct Answer: Has polished / is</strong>"
        }
    ];

    // state aplikasi
    let currentIndex = 0;
    let userAnswers = new Array(questionsData.length).fill(null);
    let answerStatus = new Array(questionsData.length).fill(false);
    let answeredQuestions = new Array(questionsData.length).fill(false);
    let score = 0;
    
    const totalQ = questionsData.length;
    document.getElementById("totalQuestions").innerText = totalQ;
    document.getElementById("totalDisplay").innerText = totalQ;
    
    // Elemen DOM
    const questionTextEl = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const feedbackArea = document.getElementById("feedbackArea");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const scoreSpan = document.getElementById("scoreValue");
    const currentIdxDisplaySpan = document.getElementById("currentIdxDisplay");
    const resultAreaDiv = document.getElementById("resultArea");
    const quizCardDiv = document.getElementById("quizCard");
    
    // fungsi hitung ulang score
    function recalcScore() {
        let newScore = 0;
        for (let i = 0; i < totalQ; i++) {
            if (answerStatus[i] === true) newScore++;
        }
        score = newScore;
        scoreSpan.innerText = score;
    }
    
    // update tombol navigasi
    function updateNavButtons() {
        prevBtn.disabled = (currentIndex === 0);
        
        if (currentIndex === totalQ - 1) {
            nextBtn.innerHTML = '<i class="fas fa-check-circle"></i> Lihat Hasil';
        } else {
            nextBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Selanjutnya';
        }
        
        if (!answeredQuestions[currentIndex]) {
            nextBtn.disabled = true;
        } else {
            nextBtn.disabled = false;
        }
    }
    
    // render feedback
    function renderFeedbackForCurrent() {
        const idx = currentIndex;
        const selected = userAnswers[idx];
        const isAnswered = answeredQuestions[idx];
        const isCorrect = answerStatus[idx];
        const question = questionsData[idx];
        
        if (!isAnswered || selected === null) {
            feedbackArea.className = "feedback-area feedback-neutral";
            feedbackArea.innerHTML = `<div class="feedback-text"><i class="fas fa-lightbulb"></i> Pilih salah satu jawaban untuk melihat pembahasan & kunci.</div>`;
            return;
        }
        
        const selectedText = question.o[selected];
        const correctText = question.o[question.correct];
        const explanation = question.explanation;
        
        if (isCorrect) {
            feedbackArea.className = "feedback-area feedback-correct";
            feedbackArea.innerHTML = `
                <div class="feedback-text">
                    <i class="fas fa-check-circle" style="color:#2b9348; font-size:1.2rem;"></i>
                    <strong>✅ Jawaban Benar / Correct!</strong> &nbsp; Pilihanmu: "${selectedText}" 
                </div>
                <div style="margin-top: 12px; font-size:0.95rem; line-height:1.6;">${explanation}</div>
            `;
        } else {
            feedbackArea.className = "feedback-area feedback-wrong";
            feedbackArea.innerHTML = `
                <div class="feedback-text">
                    <i class="fas fa-times-circle" style="color:#e63946; font-size:1.2rem;"></i>
                    <strong>❌ Jawaban Salah / Incorrect</strong> &nbsp; Kamu menjawab: "${selectedText}"
                </div>
                <div style="margin-top: 12px; font-size:0.95rem; line-height:1.6;">${explanation}<br><br>📌 <strong>Jawaban yang benar / Correct answer:</strong> "${correctText}"</div>
            `;
        }
    }
    
    // render soal
    function renderCurrentQuestion() {
        const qData = questionsData[currentIndex];
        questionTextEl.innerText = qData.q;
        const selectedIdx = userAnswers[currentIndex];
        const isAnsweredLocal = answeredQuestions[currentIndex];
        
        let optionsHtml = '';
        const letters = ['A', 'B', 'C', 'D'];
        qData.o.forEach((opt, idx) => {
            let additionalClass = '';
            let checkedStyle = '';
            if (isAnsweredLocal && selectedIdx === idx) {
                additionalClass = 'style="background: #E9DFFF; border-color: #9B6BFF; box-shadow: 0 2px 8px rgba(155,107,255,0.2);"';
                checkedStyle = 'font-weight: bold;';
            }
            optionsHtml += `
                <div class="option-btn" data-opt-index="${idx}" ${additionalClass}>
                    <span class="prefix">${letters[idx]}</span>
                    <span style="flex:1; ${checkedStyle}">${opt}</span>
                </div>
            `;
        });
        optionsContainer.innerHTML = optionsHtml;
        
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const optIndex = parseInt(btn.dataset.optIndex);
                handleAnswer(optIndex);
            });
        });
        
        renderFeedbackForCurrent();
        updateNavButtons();
        document.getElementById("currentIdxDisplay").innerText = currentIndex + 1;
    }
    
    // handle jawaban
    function handleAnswer(selectedIndex) {
        const currentQ = questionsData[currentIndex];
        const isCorrectNow = (selectedIndex === currentQ.correct);
        const wasAlreadyAnswered = answeredQuestions[currentIndex];
        
        userAnswers[currentIndex] = selectedIndex;
        answeredQuestions[currentIndex] = true;
        const oldStatus = answerStatus[currentIndex];
        answerStatus[currentIndex] = isCorrectNow;
        
        if (oldStatus !== isCorrectNow) {
            recalcScore();
        } else if (!wasAlreadyAnswered && isCorrectNow) {
            recalcScore();
        } else if (!wasAlreadyAnswered && !isCorrectNow) {
            recalcScore();
        } else if (wasAlreadyAnswered && oldStatus !== isCorrectNow) {
            recalcScore();
        } else {
            recalcScore();
        }
        
        renderCurrentQuestion();
        updateNavButtons();
    }
    
    // navigasi
    function goNext() {
        if (currentIndex < totalQ - 1) {
            currentIndex++;
            renderCurrentQuestion();
            updateNavButtons();
        } else {
            if (answeredQuestions.every(v => v === true)) {
                showFinalResult();
            } else {
                alert(`⚠️ Anda belum menjawab semua soal! Selesaikan dulu ${totalQ - answeredQuestions.filter(v=>v===true).length} soal tersisa.`);
                return;
            }
        }
    }
    
    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
            updateNavButtons();
        }
    }
    
    // analisis kelemahan
    function analyzeWeakness() {
        let categories = {
            "Past Continuous Tense": [],
            "Future Tense (will)": [],
            "Used to (Past Habit)": [],
            "Simple Present Tense": [],
            "Prepositions of Place": [],
            "Simple Past Tense": [],
            "Present Perfect Tense": [],
            "Quantifiers (None/All)": [],
            "Wh-Questions (Whom)": []
        };
        
        for (let i = 0; i < totalQ; i++) {
            const isCorrect = answerStatus[i];
            const qText = questionsData[i].q;
            let category = "";
            
            if (qText.includes("when the fire alarm rang")) category = "Past Continuous Tense";
            else if (qText.includes("tomorrow")) category = "Future Tense (will)";
            else if (qText.includes("used to") || qText.includes("3 years ago")) category = "Used to (Past Habit)";
            else if (qText.includes("every weekend") || qText.includes("every evening") || qText.includes("every morning") || qText.includes("every day")) category = "Simple Present Tense";
            else if (qText.includes("the Freezer") || qText.includes("preposition")) category = "Prepositions of Place";
            else if (qText.includes("yesterday") || qText.includes("last night") || qText.includes("ago") || qText.includes("in the morning")) category = "Simple Past Tense";
            else if (qText.includes("yet") || qText.includes("recently") || qText.includes("for eight years") || qText.includes("has polished")) category = "Present Perfect Tense";
            else if (qText.includes("None/All")) category = "Quantifiers (None/All)";
            else if (qText.includes("Whom")) category = "Wh-Questions (Whom)";
            else category = "Other";
            
            if (!isCorrect) {
                categories[category] = categories[category] || [];
                categories[category].push(i+1);
            }
        }
        
        let weaknesses = [];
        for (let [cat, arr] of Object.entries(categories)) {
            if (arr.length > 0) weaknesses.push({ cat, count: arr.length, soal: arr });
        }
        return weaknesses;
    }
    
    // tampilkan hasil akhir
    function showFinalResult() {
        quizCardDiv.style.display = "none";
        document.querySelector(".score-panel").style.display = "none";
        resultAreaDiv.style.display = "block";
        
        const percentage = (score / totalQ) * 100;
        let gradeText = "";
        if (percentage >= 85) gradeText = "🏆 Excellent! Grammar pro!";
        else if (percentage >= 70) gradeText = "🎉 Good job, tingkatkan lagi!";
        else if (percentage >= 50) gradeText = "📚 Perlu belajar lebih giat, fokus pada pembahasan.";
        else gradeText = "⚠️ Masih banyak kelemahan, pelajari ulang materi dasar.";
        
        const weaknesses = analyzeWeakness();
        let weakHtml = `<div style="margin-top: 16px;"><strong><i class="fas fa-chart-line"></i> Analisis Kelemahan / Weakness Analysis:</strong><br/>`;
        if (weaknesses.length === 0) {
            weakHtml += `<span class="weakness-tag"><i class="fas fa-check-circle"></i> Hebat! Tidak ada kelemahan signifikan! / Great! No significant weaknesses!</span>`;
        } else {
            weakHtml += `<div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;">`;
            weaknesses.forEach(w => {
                weakHtml += `<span class="weakness-tag"><i class="fas fa-exclamation-triangle"></i> ${w.cat} (salah di ${w.soal.length} soal: nomor ${w.soal.join(", ")})</span>`;
            });
            weakHtml += `</div><p style="margin-top: 12px; font-size: 0.85rem;">✨ Fokus ulang pada materi di atas untuk meningkatkan skor! / Focus on the topics above to improve your score!</p>`;
        }
        
        resultAreaDiv.innerHTML = `
            <div style="text-align: center;">
                <i class="fas fa-chalkboard-user" style="font-size: 3rem; color:#8B5CF6;"></i>
                <h2 style="margin: 10px 0 5px;">Hasil Evaluasi Grammar / Grammar Evaluation Result</h2>
                <div style="font-size: 2.5rem; font-weight: 800; background: linear-gradient(145deg,#7C3AED,#A78BFA); -webkit-background-clip:text; background-clip:text; color:transparent;">${score}/${totalQ}</div>
                <div style="background:#ede8ff; display:inline-block; padding:5px 18px; border-radius:40px;">${gradeText}</div>
                <div style="margin: 20px auto; max-width: 200px;">
                    <canvas id="scoreChart" width="200" height="200"></canvas>
                </div>
                ${weakHtml}
                <button id="restartQuizBtn" class="nav-btn nav-btn-primary" style="margin-top: 25px; background: #5a2d9c;"><i class="fas fa-sync-alt"></i> Ulangi Kuis / Restart Quiz</button>
            </div>
        `;
        
        const ctx = document.getElementById('scoreChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Benar / Correct', 'Salah / Incorrect'],
                datasets: [{
                    data: [score, totalQ - score],
                    backgroundColor: ['#9B6BFF', '#F0E6FF'],
                    borderWidth: 0,
                    cutout: '65%'
                }]
            },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
        });
        
        document.getElementById("restartQuizBtn").addEventListener("click", () => {
            userAnswers.fill(null);
            answerStatus.fill(false);
            answeredQuestions.fill(false);
            currentIndex = 0;
            score = 0;
            recalcScore();
            quizCardDiv.style.display = "block";
            document.querySelector(".score-panel").style.display = "flex";
            resultAreaDiv.style.display = "none";
            renderCurrentQuestion();
            updateNavButtons();
        });
    }
    
    // event listeners
    prevBtn.addEventListener("click", goPrev);
    nextBtn.addEventListener("click", goNext);
    
    // init
    recalcScore();
    renderCurrentQuestion();
</script>
</body>
</html>
