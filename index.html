<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 SALVO QUIZ PRO</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

<style>
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#6c2bd9,#9333ea);
margin:0;padding:20px;color:#333;
}

.quiz{
max-width:900px;margin:auto;background:white;border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.3);overflow:hidden;
}

.header{
background:linear-gradient(135deg,#7c3aed,#a855f7);
color:white;padding:20px;text-align:center;
}

.topbar{
display:flex;justify-content:space-between;flex-wrap:wrap;
padding:15px;background:#faf5ff;font-weight:bold;
}

.progress-bar{width:100%;height:10px;background:#ddd;}
#progressFill{
height:10px;width:0%;
background:linear-gradient(90deg,#7c3aed,#a855f7);
transition:0.3s;
}

.content{padding:25px;}

.option{
padding:14px;margin:10px 0;border-radius:12px;
border:1px solid #ddd;cursor:pointer;transition:0.2s;
}
.option:hover{transform:scale(1.02);background:#f5f3ff;}

.correct{background:#dcfce7;border-color:green;}
.wrong{background:#fee2e2;border-color:red;}

.explanation{
margin-top:15px;padding:12px;background:#fff7ed;
border-left:5px solid orange;border-radius:10px;
}

.nav{
display:flex;justify-content:space-between;padding:20px;
}

button{
padding:10px 18px;border:none;border-radius:10px;
background:#7c3aed;color:white;font-weight:bold;cursor:pointer;
}
button:disabled{opacity:0.4}

.number-nav{text-align:center;padding:10px;}
.number-nav button{
margin:4px;width:35px;height:35px;border-radius:50%;
}
.answered{background:#22c55e;}
.active{background:#111827;color:white;}

.result{
text-align:center;padding:30px;display:none;
}
.grade{
font-size:28px;font-weight:bold;color:#7c3aed;
}

.toast{
position:fixed;bottom:20px;right:20px;
padding:12px 20px;border-radius:10px;
color:white;font-weight:bold;
}
</style>
</head>

<body>

<div class="quiz">

<div class="header">
<h2>🔥 SALVO QUIZ PRO</h2>
<p>Advanced Grammar System</p>
</div>

<div class="topbar">
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="timer">10:00</span></div>
</div>

<div class="progress-bar">
<div id="progressFill"></div>
</div>

<div class="content">
<h3 id="question"></h3>
<div id="options"></div>
<div id="explanation"></div>
</div>

<div class="number-nav" id="numberNav"></div>

<div class="nav">
<button id="prevBtn">⬅</button>
<button id="nextBtn">➡</button>
<button id="submitBtn">Submit</button>
</div>

<div class="result" id="resultBox">
<h2>Quiz Complete</h2>
<div id="finalScore"></div>
<div class="grade" id="grade"></div>
<button onclick="location.reload()">Restart</button>
</div>

</div>

<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c8f3a0d4e.mp3"></audio>

<script>

const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");

const questions=[

{
q:"You should ________ it fixed before it stops working.",
o:["have","having","had","to have"],a:0,
e:"Causative: should have something done"
},
{
q:"If only I _____ more willing before",
o:["had been","was","am","have been"],a:0,
e:"If only + past perfect"
},
{
q:"Not only ________ more employees, but also expanded",
o:["have we hired","we hired","we have hired","did we hire"],a:0,
e:"Inversion after not only"
},
{
q:"You should ________ me earlier",
o:["have told","told","tell","telling"],a:0,
e:"Should have + V3"
},
{
q:"Rarely ________ someone experience this",
o:["does","did","has","is"],a:0,
e:"Inversion → does"
},
{
q:"Nor ________ to take responsibility",
o:["does he try","he tries","did he try","he try"],a:0,
e:"Nor → inversion"
},
{
q:"I wish I ________ more carefully",
o:["had thought","thought","have thought","think"],a:0,
e:"Wish → past perfect"
},
{
q:"If she _____ tomorrow, we will go",
o:["comes","came","come","coming"],a:0,
e:"First conditional"
},
{
q:"If it ______ tomorrow, we can't picnic",
o:["rains","rain","rained","raining"],a:0,
e:"Present simple"
},
{
q:"If you _____ him, tell him",
o:["see","saw","seen","seeing"],a:0,
e:"First conditional"
},
{
q:"If she doesn't hurry, she _____ miss",
o:["will","would","can","should"],a:0,
e:"Will future"
},
{
q:"If I ___ money, I will buy car",
o:["have","had","having","has"],a:0,
e:"Present simple"
},
{
q:"If you _____ to see it, borrow mine",
o:["want","wanted","wanting","wants"],a:0,
e:"Present simple"
},
{
q:"If you _____ too loud, hearing damaged",
o:["listen","listened","listening","listens"],a:0,
e:"Present simple"
},
{
q:"If I _____ you, I would go",
o:["were","am","was","be"],a:0,
e:"If I were you"
},
{
q:"If he ate, he would have teeth issues",
o:["Correct","Wrong","Wrong","Wrong"],a:0,
e:"Second conditional correct"
},
{
q:"My boss would ____ pleased",
o:["be","is","was","been"],a:0,
e:"Would + V1"
},
{
q:"If they ____ the match, they celebrate",
o:["win","won","winning","wins"],a:0,
e:"First conditional"
},
{
q:"If you _____ exam, you'd be happy",
o:["had passed","pass","passed","passing"],a:0,
e:"Third conditional"
}

];

let current=0;
let answers=new Array(questions.length).fill(null);
let submitted=false;
let time=600;

function render(){
let q=questions[current];
document.getElementById("question").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((opt,i)=>{
let div=document.createElement("div");
div.className="option";

if(answers[current]!=null){
if(i==q.a) div.classList.add("correct");
if(i==answers[current] && i!=q.a) div.classList.add("wrong");
}

div.innerText=opt;

div.addEventListener("click",()=>{
if(answers[current]!=null||submitted) return;

answers[current]=i;

if(i==q.a){
confetti({particleCount:80,spread:60});
correctSound.currentTime=0;
correctSound.play();
}else{
wrongSound.currentTime=0;
wrongSound.play();
}

render();
updateScore();
});

box.appendChild(div);
});

let exp=document.getElementById("explanation");
exp.innerHTML=answers[current]!=null?`<b>Penjelasan:</b> ${q.e}`:"";

updateNav();
updateProgress();
updateNumberNav();
}

function updateScore(){
let score=answers.filter((a,i)=>a===questions[i].a).length;
document.getElementById("score").innerText=score;
}

function updateProgress(){
let done=answers.filter(a=>a!=null).length;
document.getElementById("progressFill").style.width=(done/questions.length*100)+"%";
}

function updateNumberNav(){
let nav="";
for(let i=0;i<questions.length;i++){
let cls="";
if(answers[i]!=null) cls+="answered ";
if(i==current) cls+="active";
nav+=`<button class="${cls}" onclick="go(${i})">${i+1}</button>`;
}
document.getElementById("numberNav").innerHTML=nav;
}

function updateNav(){
document.getElementById("prevBtn").disabled=current==0;
document.getElementById("nextBtn").disabled=current==questions.length-1;
}

function go(i){current=i;render();}

document.getElementById("nextBtn").onclick=()=>{if(current<questions.length-1){current++;render();}};
document.getElementById("prevBtn").onclick=()=>{if(current>0){current--;render();}};

setInterval(()=>{
if(submitted) return;
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerText=`${m}:${s.toString().padStart(2,'0')}`;
if(time<=0) submit();
time--;
},1000);

function submit(){
if(submitted) return;
submitted=true;

let score=answers.filter((a,i)=>a===questions[i].a).length;
let percent=Math.round(score/questions.length*100);
let grade=percent>=90?"A":percent>=80?"B":percent>=70?"C":percent>=60?"D":"E";

document.getElementById("resultBox").style.display="block";
document.getElementById("finalScore").innerText=`Score: ${score}/${questions.length} (${percent}%)`;
document.getElementById("grade").innerText=`Grade: ${grade}`;

confetti({particleCount:120,spread:70});
}

document.getElementById("submitBtn").onclick=submit;

render();

</script>

</body>
</html>
